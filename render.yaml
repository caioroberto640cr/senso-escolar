# Blueprint do Render — EduInsight
# Serviço único: o Express serve a API (/api) e o site buildado (web/dist).
services:
  - type: web
    name: eduinsight
    runtime: node
    plan: free
    buildCommand: cd web && npm install --include=dev && npm run build && cd ../api && npm install
    startCommand: cd api && npm start
    envVars:
      - key: NODE_VERSION
        value: '22'
      # Cole a connection string do Neon no painel do Render (Environment).
      - key: DATABASE_URL
        sync: false
      # Segredo dos tokens JWT — gerado automaticamente pelo Render.
      - key: JWT_SECRET
        generateValue: true
